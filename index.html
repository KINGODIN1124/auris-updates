<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auris - Premium Music Client</title>
  <style>
    :root {
      --bg-color: #0b0b0e;
      --accent-color: #ec008c;
      --text-color: #f3f4f6;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    /* Background gradients */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(236,0,140,0.15) 0%, rgba(0,0,0,0) 70%);
      top: -100px;
      left: -100px;
      z-index: 1;
    }
    body::after {
      content: '';
      position: absolute;
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, rgba(252,103,103,0.1) 0%, rgba(0,0,0,0) 70%);
      bottom: -150px;
      right: -150px;
      z-index: 1;
    }
    .content-card {
      z-index: 10;
      text-align: center;
      max-width: 500px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 48px;
      font-weight: 800;
      margin: 0 0 10px 0;
      background: linear-gradient(135deg, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1.5px;
    }
    p {
      font-size: 16px;
      color: #9ca3af;
      line-height: 1.6;
      margin: 0 0 30px 0;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #ec008c, #fc6767);
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 36px;
      border-radius: 50px;
      box-shadow: 0 10px 25px rgba(236,0,140,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 30px rgba(236,0,140,0.6);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .badge {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent-color);
      font-weight: 700;
      margin-bottom: 15px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="content-card">
    <span class="badge">Desktop Client</span>
    <h1>Auris Music</h1>
    <p>Ad-free premium audio client powered by YouTube streams with synced lyrics, customizable playlists, and Discord presence.</p>
    <a href="https://github.com/KINGODIN1124/auris-updates/raw/main/Auris-Setup.exe" class="btn">Download for Windows</a>
  </div>
</body>
</html>
